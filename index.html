<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TASK_MATRIX</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a12; color: #e0f0ff; font-family: 'Courier New', monospace; min-height: 100vh; padding: 1.5rem 2rem; }
  h1 { font-size: 22px; color: #00e5ff; letter-spacing: 4px; font-weight: bold; }
  input, select, textarea {
    background: #0a0e1a; border: 1px solid #00e5ff44; color: #e0f0ff;
    padding: 7px 12px; border-radius: 4px; font-family: 'Courier New', monospace;
    font-size: 13px; outline: none; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: #00e5ff; }
  textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
  button {
    background: transparent; border: 1px solid #00e5ff66; color: #00e5ff;
    padding: 6px 14px; border-radius: 3px; font-family: 'Courier New', monospace;
    font-size: 12px; cursor: pointer; letter-spacing: 1px;
  }
  button:hover { background: #00e5ff18; border-color: #00e5ff; }
  button.primary { border-color: #00e5ff; background: #00e5ff18; }
  button.primary:hover { background: #00e5ff30; }
  button.danger { border-color: #ff2d5566; color: #ff2d55; }
  button.danger:hover { background: #ff2d5518; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .card { background: #0f0f1e; border: 1px solid #00e5ff33; border-radius: 6px; padding: 12px 16px; transition: border-color 0.15s; }
  .card:hover { border-color: #00e5ff55; }
  .tab-bar { display: flex; border-bottom: 1px solid #00e5ff22; margin-bottom: 16px; }
  .tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: #5a7a8a; padding: 8px 18px; font-family: 'Courier New', monospace; font-size: 13px; cursor: pointer; letter-spacing: 1px; margin-bottom: -1px; }
  .tab.active { color: #00e5ff; border-bottom-color: #00e5ff; }
  .pill { padding: 3px 10px; border-radius: 2px; font-size: 11px; letter-spacing: 1px; font-weight: bold; }
  .cat-pill { background: transparent; border: 1px solid #00e5ff44; color: #5a7a8a; padding: 4px 12px; border-radius: 3px; font-size: 12px; cursor: pointer; }
  .cat-pill.active { border-color: #00e5ff; color: #00e5ff; background: #00e5ff12; }
  .check { width: 22px; height: 22px; border-radius: 2px; border: 1px solid #00e5ff66; background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .check.done { background: #00e5ff22; border-color: #00e5ff; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .row-top { display: flex; align-items: flex-start; gap: 12px; }
  .flex1 { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; line-height: 1.5; margin-bottom: 7px; cursor: text; }
  .task-title:hover { color: #00e5ff; }
  .task-title-input { font-size: 13px; line-height: 1.5; margin-bottom: 7px; padding: 2px 6px; width: 100%; }
  .meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .field-label { font-size: 11px; color: #5a7a8a; margin-bottom: 4px; letter-spacing: 1px; }
  .notes-text { font-size: 12px; color: #7a9aaa; line-height: 1.6; margin-top: 10px; padding-top: 10px; border-top: 1px solid #00e5ff18; white-space: pre-wrap; word-break: break-word; }
  .notes-toggle { font-size: 11px; color: #5a7a8a; cursor: pointer; letter-spacing: 1px; background: none; border: none; padding: 0; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .notes-toggle:hover { color: #00e5ff; background: none; border: none; }
  #toast { position: fixed; bottom: 1.5rem; right: 1rem; left: 1rem; text-align: center; background: #0f0f1e; border: 1px solid #00e5ff66; color: #00e5ff; padding: 10px 18px; border-radius: 4px; font-size: 12px; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }
  #toast.err { border-color: #ff2d5566; color: #ff2d55; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 1px solid #00e5ff44; border-top-color: #00e5ff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .main-layout { display: flex; gap: 24px; align-items: flex-start; }
  .list-col { flex: 0 0 420px; min-width: 0; }
  .timeline-col { flex: 1; min-width: 0; overflow: hidden; }
  .tl-section-title { font-size: 11px; color: #5a7a8a; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid #00e5ff22; padding-bottom: 8px; }
  .tl-wrap { overflow-x: auto; padding-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .tl-wrap::-webkit-scrollbar { height: 10px; }
  .tl-wrap::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 4px; }
  .tl-wrap::-webkit-scrollbar-thumb { background: #00e5ff88; border-radius: 4px; border: 2px solid #1a1a2e; }
  .tl-wrap::-webkit-scrollbar-thumb:hover { background: #00e5ffcc; }
  .tl-wrap { scrollbar-color: #00e5ff88 #1a1a2e; scrollbar-width: thin; }
  .tl-bar-row { display: flex; align-items: center; margin-bottom: 6px; }
  .tl-label { width: 146px; flex-shrink: 0; padding-right: 6px; display: flex; align-items: center; gap: 6px; }
  .tl-grid { position: relative; height: 22px; flex: 1; }
  .tl-grid-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; }
  .tl-bar { position: absolute; top: 3px; height: 16px; border-radius: 2px; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    h1 { font-size: 16px; letter-spacing: 2px; }
    .main-layout { flex-direction: column; gap: 0; }
    .list-col { flex: none; width: 100%; }
    .timeline-col { width: 100%; margin-top: 24px; }
    .grid3 { grid-template-columns: 1fr; gap: 8px; }
    .tab { padding: 8px 12px; font-size: 12px; }
    button { padding: 8px 12px; font-size: 12px; }
    .cat-pill { padding: 6px 10px; font-size: 12px; }
    .task-title { font-size: 14px; }
    .pill { font-size: 12px; padding: 4px 10px; }
    .card { padding: 12px; }
    .check { width: 26px; height: 26px; }
    .tl-label { width: 120px; }
  }
</style>

<div id="toast"></div>
<div id="app" style="max-width:1400px;margin:0 auto;"></div>

<script>
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const PRIORITIES = ["High","Medium","Low"];
const P_COLOR = { High:"#ff2d55", Medium:"#f0c040", Low:"#00e5ff" };
const P_DIM   = { High:"#7a1428", Medium:"#6b5200", Low:"#004d57" };
const DEFAULT_CATS = ["Work","Personal","Health","Finance","Other","Bakery"];
const TESCO_START = new Date("2026-03-02");
const PERIOD_MAP = [
  {p:"P1",wks:[1,2,3,4,5]},{p:"P2",wks:[6,7,8,9]},{p:"P3",wks:[10,11,12,13]},
  {p:"P4",wks:[14,15,16,17,18]},{p:"P5",wks:[19,20,21,22]},{p:"P6",wks:[23,24,25,26]},
  {p:"P7",wks:[27,28,29,30,31]},{p:"P8",wks:[32,33,34,35]},{p:"P9",wks:[36,37,38,39]},
  {p:"P10",wks:[40,41,42,43,44]},{p:"P11",wks:[45,46,47,48]},{p:"P12",wks:[49,50,51,52]},
];

function wkMonday(w){const d=new Date(TESCO_START);d.setDate(d.getDate()+(w-1)*7);return d;}
function fmtWkLabel(w){const m=wkMonday(w);return`${m.getDate()}.${m.getMonth()+1}`;}
function dateToWk(s){const d=new Date(s+"T00:00:00");const diff=Math.floor((d-TESCO_START)/86400000);if(diff<0)return 1;return Math.min(Math.max(Math.floor(diff/7)+1,1),52);}
function wkToDate(w){return wkMonday(w).toISOString().split("T")[0];}
function todayStr(){return new Date().toISOString().split("T")[0];}
function curWk(){return dateToWk(todayStr());}
function periodOf(w){return(PERIOD_MAP.find(p=>p.wks.includes(w))||{p:""}).p;}

let tasks=[], cats=[...DEFAULT_CATS];
let curTab="list", curFilter="All", curSort="due", tlFilter="All";
let showForm=false, editingTask=null, editingCat=null, expandedNotes={}, editingTitle=null;
let loading=true;

function toast(msg,err=false){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="show"+(err?" err":"");
  setTimeout(()=>el.className="",2200);
}

async function loadData(){
  loading=true; render();
  const {data:td,error:te}=await sb.from("tasks").select("*").order("created_at",{ascending:true});
  const {data:cd,error:ce}=await sb.from("categories").select("*").order("sort_order",{ascending:true});
  if(te||ce){toast("DB ERROR — check Supabase config",true);loading=false;render();return;}
  tasks=td||[];
  cats=(cd&&cd.length>0)?cd.map(r=>r.name):DEFAULT_CATS;
  loading=false; render();
}

async function addTask(t){
  const {data,error}=await sb.from("tasks").insert([t]).select().single();
  if(error){toast("SAVE FAILED",true);return;}
  tasks=[...tasks,data]; render();
}
async function updateTask(id,changes){
  const {error}=await sb.from("tasks").update(changes).eq("id",id);
  if(error){toast("UPDATE FAILED",true);return;}
  tasks=tasks.map(t=>t.id===id?{...t,...changes}:t); render();
}
async function deleteTask(id){
  const {error}=await sb.from("tasks").delete().eq("id",id);
  if(error){toast("DELETE FAILED",true);return;}
  tasks=tasks.filter(t=>t.id!==id);
  delete expandedNotes[id]; render();
}
async function purgeCompleted(){
  const ids=tasks.filter(t=>t.done).map(t=>t.id);
  if(!ids.length)return;
  await sb.from("tasks").delete().in("id",ids);
  tasks=tasks.filter(t=>!t.done); render();
}
async function saveCats(newCats){
  await sb.from("categories").delete().neq("name","__never__");
  await sb.from("categories").insert(newCats.map((n,i)=>({name:n,sort_order:i})));
  cats=newCats; render();
}
async function doRename(idx,val){
  val=val.trim();if(!val)return;
  const old=cats[idx];
  const nc=cats.map((c,i)=>i===idx?val:c);
  for(const t of tasks.filter(t=>t.category===old)) await sb.from("tasks").update({category:val}).eq("id",t.id);
  tasks=tasks.map(t=>t.category===old?{...t,category:val}:t);
  if(curFilter===old)curFilter=val;
  if(tlFilter===old)tlFilter=val;
  editingCat=null;
  await saveCats(nc);
}
async function doDelCat(idx){
  const name=cats[idx];
  const nc=cats.filter((_,i)=>i!==idx);
  const fallback=nc[0]||"Other";
  for(const t of tasks.filter(t=>t.category===name)) await sb.from("tasks").update({category:fallback}).eq("id",t.id);
  tasks=tasks.map(t=>t.category===name?{...t,category:fallback}:t);
  if(curFilter===name)curFilter="All";
  if(tlFilter===name)tlFilter="All";
  await saveCats(nc);
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children){if(typeof c==="string")e.appendChild(document.createTextNode(c));else if(c)e.appendChild(c);}
  return e;
}
function div(attrs,children){return el("div",attrs,children||[]);}
function btn(label,attrs,onClick){const b=el("button",{...attrs,onClick});b.innerHTML=label;return b;}
function inp(attrs){return el("input",attrs);}
function mkSelect(attrs,options,value){
  const s=el("select",attrs);
  for(const o of(Array.isArray(options)?options:[])){
    const v=typeof o==="object"?(o.v!==undefined?o.v:o.l):o;
    const l=typeof o==="object"?(o.l||o.v):o;
    const op=document.createElement("option");
    op.value=String(v); op.textContent=String(l);
    if(String(v)===String(value||""))op.selected=true;
    s.appendChild(op);
  }
  return s;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(loading){
    app.appendChild(div({style:{padding:"2rem",color:"#00e5ff",fontSize:"13px",letterSpacing:"2px"}}));
    app.firstChild.innerHTML=`<span class="spinner"></span>CONNECTING TO DATABASE...`;
    return;
  }
  const cw=curWk();
  const pending=tasks.filter(t=>!t.done).length;
  const overdue=tasks.filter(t=>!t.done&&t.due&&t.due<todayStr()).length;

  // Header
  const hdr=div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px",borderBottom:"1px solid #00e5ff22",paddingBottom:"12px"}});
  hdr.appendChild(div({},[
    el("h1",{},["TASK_MATRIX"]),
    div({style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px",marginTop:"4px"}},
      [document.createTextNode(`${pending} PENDING${overdue>0?" / "+overdue+" OVERDUE":""} / WK${cw} ACTIVE`)])
  ]));
  hdr.appendChild(btn(showForm?"[ CANCEL ]":"[ + NEW TASK ]",{class:"primary"},()=>{showForm=!showForm;render();}));
  app.appendChild(hdr);

  // Add form
  if(showForm){
    const form=div({class:"card",style:{marginBottom:"14px",borderColor:"#00e5ff66"}});
    const titleIn=inp({placeholder:"// task description...",style:{display:"block",marginBottom:"8px"}});
    const grid=div({class:"grid3"});
    const dueIn=inp({type:"date"});
    const priSel=el("select",{style:{width:"100%",background:"#0a0e1a",border:"1px solid #00e5ff44",color:"#e0f0ff",padding:"6px 8px",borderRadius:"4px",fontFamily:"'Courier New',monospace",fontSize:"13px",outline:"none"}});
    PRIORITIES.forEach(p=>{const o=document.createElement("option");o.value=p;o.textContent=p;if(p==="Medium")o.selected=true;priSel.appendChild(o);});
    const catOptions=cats.length>0?cats:DEFAULT_CATS;
    const catSel=el("select",{style:{width:"100%",background:"#0a0e1a",border:"1px solid #00e5ff44",color:"#e0f0ff",padding:"6px 8px",borderRadius:"4px",fontFamily:"'Courier New',monospace",fontSize:"13px",outline:"none"}});
    catOptions.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;catSel.appendChild(o);});
    [["DUE_DATE",dueIn],["PRIORITY",priSel],["CATEGORY",catSel]].forEach(([lbl,ctrl])=>{
      const w=div({});
      w.appendChild(div({class:"field-label"},[lbl]));
      w.appendChild(ctrl);
      grid.appendChild(w);
    });
    const notesIn=el("textarea",{placeholder:"// notes (optional)...",style:{display:"block",marginTop:"8px",marginBottom:"8px"}});
    form.appendChild(titleIn);
    form.appendChild(grid);
    form.appendChild(notesIn);
    const submitFn=()=>{
      const title=titleIn.value.trim();
      if(!title)return;
      addTask({title,due:dueIn.value||null,priority:priSel.value,category:catSel.value,notes:notesIn.value.trim()||null,done:false,created_at:new Date().toISOString()});
      showForm=false;
    };
    titleIn.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey)submitFn();});
    form.appendChild(btn("[ COMMIT TASK ]",{class:"primary"},submitFn));
    app.appendChild(form);
  }

  // Tabs
  const tabBar=div({class:"tab-bar"});
  ["list","categories"].forEach(t=>{
    tabBar.appendChild(btn(t==="list"?"LIST":"CATEGORIES",{class:"tab"+(curTab===t?" active":"")},()=>{curTab=t;render();}));
  });
  app.appendChild(tabBar);

  if(curTab==="list"){
    const layout=div({class:"main-layout"});
    const listCol=div({class:"list-col"});
    const tlCol=div({class:"timeline-col"});
    renderList(listCol,cw);
    renderTimeline(tlCol,cw);
    layout.appendChild(listCol);
    layout.appendChild(tlCol);
    app.appendChild(layout);
  } else {
    renderCategories(app);
  }
}

function renderList(app,cw){
  const filtered=tasks
    .filter(t=>curFilter==="All"||t.category===curFilter)
    .sort((a,b)=>{
      if(curSort==="due")return(a.due||"z")<(b.due||"z")?-1:1;
      const po={High:0,Medium:1,Low:2};return po[a.priority]-po[b.priority];
    });

  // Filter bar
  const filterBar=div({style:{display:"flex",gap:"6px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}});
  const pills=div({style:{display:"flex",gap:"4px",flexWrap:"wrap",flex:"1"}});
  ["All",...cats].forEach(c=>{
    pills.appendChild(btn(c,{class:"cat-pill"+(curFilter===c?" active":"")},()=>{curFilter=c;render();}));
  });
  filterBar.appendChild(pills);
  const sortSel=mkSelect({style:{width:"auto",flex:"none",background:"#0a0e1a",border:"1px solid #00e5ff44",color:"#5a7a8a",padding:"4px 8px",borderRadius:"4px",fontFamily:"'Courier New',monospace",fontSize:"12px",outline:"none"}},
    [{v:"due",l:"SORT:DUE"},{v:"priority",l:"SORT:PRIORITY"}],curSort);
  sortSel.addEventListener("change",e=>{curSort=e.target.value;render();});
  filterBar.appendChild(sortSel);
  app.appendChild(filterBar);

  if(filtered.length===0){
    app.appendChild(div({style:{padding:"2rem",color:"#5a7a8a",fontSize:"12px",letterSpacing:"2px"}},[tasks.length===0?"// NO TASKS FOUND":"// NO TASKS IN THIS SECTOR"]));
    return;
  }

  const list=div({style:{display:"flex",flexDirection:"column",gap:"6px"}});
  filtered.forEach(task=>{
    const isOverdue=!task.done&&task.due&&task.due<todayStr();
    const pc=P_COLOR[task.priority];
    const isEditingThis=editingTask===task.id;
    const isEditingTitleThis=editingTitle===task.id;
    const taskWk=task.due?dateToWk(task.due):null;
    const notesExpanded=!!expandedNotes[task.id];

    const card=div({class:"card",style:{opacity:task.done?"0.5":"1",borderLeft:`3px solid ${pc}`}});
    const row=div({class:"row-top"});

    // Checkbox
    const chk=div({class:"check"+(task.done?" done":"")});
    if(task.done)chk.innerHTML=`<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L4 7L9 1" stroke="#00e5ff" stroke-width="1.5" fill="none"/></svg>`;
    chk.addEventListener("click",()=>updateTask(task.id,{done:!task.done}));

    const body=div({class:"flex1"});

    // Title — click to edit
    if(isEditingTitleThis){
      const ti=inp({class:"task-title-input",value:task.title});
      setTimeout(()=>{ti.focus();ti.select();},10);
      const save=()=>{
        const v=ti.value.trim();
        if(v&&v!==task.title)updateTask(task.id,{title:v});
        else render();
        editingTitle=null;
      };
      ti.addEventListener("blur",save);
      ti.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();save();}if(e.key==="Escape"){editingTitle=null;render();}});
      body.appendChild(ti);
    } else {
      const titleEl=div({class:"task-title",style:{color:task.done?"#5a7a8a":"#e0f0ff",textDecoration:task.done?"line-through":"none"}});
      titleEl.textContent=task.title;
      titleEl.title="Click to edit";
      titleEl.addEventListener("click",()=>{if(!task.done){editingTitle=task.id;render();}});
      body.appendChild(titleEl);
    }

    // Meta row
    const meta=div({class:"meta"});
    const priBadge=el("span",{class:"pill",style:{background:P_DIM[task.priority],color:pc,border:`1px solid ${pc}44`}});
    priBadge.textContent=task.priority.toUpperCase();
    const catBadge=el("span",{class:"pill",style:{background:"#00e5ff0a",color:"#5a7a8a",border:"1px solid #00e5ff22"}});
    catBadge.textContent=task.category;
    meta.appendChild(priBadge); meta.appendChild(catBadge);
    if(task.due){
      const dl=el("span",{style:{fontSize:"11px",color:isOverdue?"#ff2d55":"#5a7a8a",letterSpacing:"1px"}});
      dl.textContent=`WK${taskWk} · ${task.due}${isOverdue?" [OVERDUE]":""}`;
      meta.appendChild(dl);
    } else {
      const nd=el("span",{style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px"}});
      nd.textContent="NO_DUE_DATE"; meta.appendChild(nd);
    }
    body.appendChild(meta);

    // Notes toggle
    if(task.notes){
      const ntBtn=btn(`${notesExpanded?"▲":"▼"} NOTES`,{class:"notes-toggle"},()=>{
        expandedNotes[task.id]=!notesExpanded; render();
      });
      body.appendChild(ntBtn);
      if(notesExpanded){
        const nt=div({class:"notes-text"});
        nt.textContent=task.notes;
        body.appendChild(nt);
      }
    }

    // Due week editor + notes editor (EDIT mode)
    if(isEditingThis){
      // Due week
      const editRow=div({style:{marginTop:"10px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
      const wkLbl=el("span",{style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px",flexShrink:"0"}});
      wkLbl.textContent="SET_DUE_WEEK:";
      const wkOpts=[{v:"",l:"-- none --"},...Array.from({length:52},(_,i)=>{const w=i+1;return{v:String(w),l:`WK${w} · ${fmtWkLabel(w)} (${periodOf(w)})`};})];
      const wkSel=mkSelect({style:{flex:"1",minWidth:"0",background:"#0a0e1a",border:"1px solid #00e5ff44",color:"#e0f0ff",padding:"5px 8px",borderRadius:"4px",fontFamily:"'Courier New',monospace",fontSize:"12px",outline:"none"}},wkOpts,taskWk?String(taskWk):"");
      wkSel.addEventListener("change",e=>{const v=e.target.value;updateTask(task.id,{due:v?wkToDate(parseInt(v)):null});});
      editRow.appendChild(wkLbl); editRow.appendChild(wkSel);
      body.appendChild(editRow);

      // Notes editor
      const notesLbl=div({class:"field-label",style:{marginTop:"10px"}},["NOTES:"]);
      const notesTA=el("textarea",{style:{marginTop:"4px"}});
      notesTA.value=task.notes||"";
      let notesTimer=null;
      notesTA.addEventListener("input",()=>{
        clearTimeout(notesTimer);
        notesTimer=setTimeout(()=>updateTask(task.id,{notes:notesTA.value.trim()||null}),800);
      });
      body.appendChild(notesLbl);
      body.appendChild(notesTA);

      const doneBtn=btn("DONE",{style:{marginTop:"8px",fontSize:"11px"}},()=>{editingTask=null;render();});
      body.appendChild(doneBtn);
    }

    // Action buttons
    const actions=div({style:{display:"flex",gap:"4px",flexShrink:"0"}});
    actions.appendChild(btn(isEditingThis?"CLOSE":"EDIT",{style:{fontSize:"11px",padding:"4px 10px"}},()=>{editingTask=isEditingThis?null:task.id;render();}));
    actions.appendChild(btn("DEL",{class:"danger",style:{fontSize:"11px",padding:"4px 10px"}},()=>deleteTask(task.id)));

    row.appendChild(chk); row.appendChild(body); row.appendChild(actions);
    card.appendChild(row);
    list.appendChild(card);
  });
  app.appendChild(list);

  if(tasks.some(t=>t.done)){
    app.appendChild(btn(`[ PURGE ${tasks.filter(t=>t.done).length} COMPLETED ]`,{class:"danger",style:{marginTop:"14px",fontSize:"11px"}},purgeCompleted));
  }
}

function renderTimeline(app,cw){
  const intro=div({class:"tl-section-title"});
  intro.textContent=`TIMELINE // WK${cw} → WK52`;
  app.appendChild(intro);

  // Category filter for timeline
  const tlFilterBar=div({style:{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"12px"}});
  ["All",...cats].forEach(c=>{
    tlFilterBar.appendChild(btn(c,{class:"cat-pill"+(tlFilter===c?" active":"")},()=>{tlFilter=c;render();}));
  });
  app.appendChild(tlFilterBar);

  const withDue=tasks.filter(t=>t.due&&(tlFilter==="All"||t.category===tlFilter));
  if(withDue.length===0){
    app.appendChild(div({style:{padding:"1rem",color:"#5a7a8a",fontSize:"12px",letterSpacing:"2px"}},["// NO DUE DATES IN THIS FILTER"]));
    return;
  }

  const CW=52;
  const wkRange=Array.from({length:53-cw},(_,i)=>cw+i);
  const periodsInRange=PERIOD_MAP.filter(({wks})=>wks.some(w=>w>=cw)).map(({p,wks})=>({p,wks:wks.filter(w=>w>=cw)}));

  const wrap=div({class:"tl-wrap"});
  const inner=div({style:{minWidth:`${wkRange.length*CW+150}px`}});

  // Period header
  const pRow=div({style:{display:"flex",marginLeft:"150px"}});
  periodsInRange.forEach(({p,wks})=>{
    const c=div({style:{width:`${wks.length*CW}px`,flexShrink:"0",textAlign:"center",fontSize:"11px",color:"#b44fff",background:"#1a0a2e",border:"1px solid #b44fff44",borderRadius:"2px",padding:"2px 0",marginRight:"1px",letterSpacing:"2px",boxSizing:"border-box"}});
    c.textContent=p; pRow.appendChild(c);
  });
  inner.appendChild(pRow);

  // Week header
  const wRow=div({style:{display:"flex",marginLeft:"150px",marginTop:"2px",marginBottom:"10px"}});
  wkRange.forEach(w=>{
    const c=div({style:{width:`${CW}px`,flexShrink:"0",textAlign:"center",fontSize:"10px",color:w===cw?"#00e5ff":"#5a7a8a",background:w===cw?"#00e5ff12":"transparent",borderRadius:"2px",padding:"2px 0",boxSizing:"border-box",fontWeight:w===cw?"bold":"normal"}});
    c.innerHTML=`<div>W${w}</div><div style="font-size:9px;opacity:.7">${fmtWkLabel(w)}</div>`;
    wRow.appendChild(c);
  });
  inner.appendChild(wRow);

  // Bars
  withDue.forEach(task=>{
    const dw=dateToWk(task.due);
    const isOverdue=!task.done&&task.due<todayStr();
    const bc=task.done?"#2a3a3a":P_COLOR[task.priority];
    const si=wkRange.indexOf(cw);
    const ei=wkRange.indexOf(Math.max(dw,cw));

    const row=div({class:"tl-bar-row"});
    const lbl=div({class:"tl-label"});
    lbl.appendChild(div({style:{width:"7px",height:"7px",borderRadius:"50%",background:bc,flexShrink:"0"}}));
    const name=el("span",{style:{fontSize:"11px",color:isOverdue?"#ff2d55":task.done?"#5a7a8a":"#e0f0ff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textDecoration:task.done?"line-through":"none",maxWidth:"128px"}});
    name.textContent=task.title; name.title=task.title;
    lbl.appendChild(name);

    const grid=div({class:"tl-grid",style:{flex:"1"}});
    const lines=div({class:"tl-grid-lines"});
    wkRange.forEach(w=>{
      lines.appendChild(div({style:{width:`${CW}px`,flexShrink:"0",borderLeft:`1px solid ${w===cw?"#00e5ff33":"#ffffff08"}`,background:w===cw?"#00e5ff06":"transparent"}}));
    });
    grid.appendChild(lines);

    if(si>=0&&ei>=0){
      const bar=div({class:"tl-bar",style:{left:`${si*CW+3}px`,width:`${Math.max((ei-si+1)*CW-6,12)}px`,background:bc,opacity:task.done?"0.3":"0.85"}});
      bar.innerHTML=`<span style="font-size:9px;color:#000;font-weight:bold">W${dw}</span>`;
      grid.appendChild(bar);
    }
    if(isOverdue&&dw<cw){
      const ob=div({class:"tl-bar",style:{left:"3px",width:`${Math.max(CW-6,12)}px`,background:"#ff2d55",opacity:"0.25"}});
      grid.appendChild(ob);
    }
    row.appendChild(lbl); row.appendChild(grid);
    inner.appendChild(row);
  });

  // Legend
  const legend=div({style:{display:"flex",gap:"14px",marginTop:"14px",paddingTop:"10px",borderTop:"1px solid #00e5ff22",flexWrap:"wrap"}});
  PRIORITIES.forEach(p=>{
    const item=div({style:{display:"flex",alignItems:"center",gap:"5px"}});
    item.appendChild(div({style:{width:"8px",height:"8px",borderRadius:"1px",background:P_COLOR[p]}}));
    const l=el("span",{style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px"}});
    l.textContent=p.toUpperCase(); item.appendChild(l); legend.appendChild(item);
  });
  inner.appendChild(legend);
  wrap.appendChild(inner);
  app.appendChild(wrap);
}

function renderCategories(app){
  app.appendChild(div({style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px",marginBottom:"12px"}},["CATEGORY_MANAGER // RENAME OR DELETE SECTORS"]));
  const list=div({style:{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"14px",maxWidth:"600px"}});
  cats.forEach((cat,idx)=>{
    const count=tasks.filter(t=>t.category===cat).length;
    const isEd=editingCat?.index===idx;
    const card=div({class:"card",style:{display:"flex",alignItems:"center",gap:"8px"}});
    if(isEd){
      const i=el("input",{style:{flex:"1",background:"#0a0e1a",border:"1px solid #00e5ff66",color:"#e0f0ff",padding:"5px 8px",borderRadius:"4px",fontFamily:"'Courier New',monospace",fontSize:"13px",outline:"none"}});
      i.value=editingCat.value;
      i.addEventListener("input",e=>editingCat={...editingCat,value:e.target.value});
      i.addEventListener("keydown",e=>{if(e.key==="Enter")doRename(idx,editingCat.value);if(e.key==="Escape"){editingCat=null;render();}});
      setTimeout(()=>i.focus(),10);
      card.appendChild(i);
    } else {
      const l=el("span",{style:{flex:"1",fontSize:"13px",color:"#e0f0ff",letterSpacing:"1px"}});
      l.textContent=cat; card.appendChild(l);
    }
    const cnt=el("span",{style:{fontSize:"11px",color:"#5a7a8a",letterSpacing:"1px",flexShrink:"0"}});
    cnt.textContent=`${count} OBJ`; card.appendChild(cnt);
    if(isEd){
      card.appendChild(btn("SAVE",{class:"primary",style:{fontSize:"11px"}},()=>doRename(idx,editingCat.value)));
      card.appendChild(btn("CANCEL",{style:{fontSize:"11px"}},()=>{editingCat=null;render();}));
    } else {
      card.appendChild(btn("RENAME",{style:{fontSize:"11px"}},()=>{editingCat={index:idx,value:cat};render();}));
      const db=btn("DELETE",{class:"danger",style:{fontSize:"11px"}},()=>{if(cats.length>1)doDelCat(idx);});
      if(cats.length<=1)db.disabled=true;
      card.appendChild(db);
    }
    list.appendChild(card);
  });
  app.appendChild(list);
  const addRow=div({style:{display:"flex",gap:"8px",maxWidth:"600px"}});
  const ni=inp({placeholder:"// new category id..."});
  addRow.appendChild(ni);
  addRow.appendChild(btn("[ ADD ]",{class:"primary"},()=>{const v=ni.value.trim();if(!v||cats.includes(v))return;saveCats([...cats,v]);ni.value="";}));
  app.appendChild(addRow);
}

loadData();
</script>
